# GitHub Actions workflow that builds the Sphinx documentation and
# publishes it to the gh-pages branch whenever you push to main.
#
# Result: https://<owner>.github.io/opendrug/

name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # required to push to gh-pages

# Avoid running two builds in parallel (e.g. main + PR).
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & deploy
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so version refs / gitinfo work

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          # Pin sphinx-autodoc-typehints to a stable release; 3.12.x has known
          # crashes when introspecting torch / torch_geometric on newer Pythons.
          pip install "sphinx-autodoc-typehints>=2.0,<3.5"
          pip install -r docs/requirements.txt

      - name: Build HTML
        working-directory: docs
        run: |
          sphinx-build -b html --keep-going -q . _build/html

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4